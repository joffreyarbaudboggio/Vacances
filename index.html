<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnet de Voyage Puy-de-D&ocirc;me 2026 — Acc&egrave;s Prot&eacute;g&eacute;</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --border: #334155;
            --radius: 12px;
            --error: #ef4444;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .gate-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            text-align: center;
            backdrop-filter: blur(12px);
        }

        .icon-container {
            width: 60px;
            height: 60px;
            background-color: rgba(56, 189, 248, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px auto;
        }

        .icon-container svg {
            width: 30px;
            height: 30px;
            stroke: var(--primary);
            stroke-width: 2;
            fill: none;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin: 0 0 32px 0;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="password"] {
            width: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-main);
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: #0f172a;
            font-weight: 700;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            padding: 14px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .error-message {
            color: var(--error);
            font-size: 13px;
            margin-top: 12px;
            font-weight: 500;
            display: none;
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: var(--text-main);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="gate-card">
        <div class="icon-container">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h1>Acc&egrave;s Prot&eacute;g&eacute;</h1>
        <p>Le carnet de voyage au Puy-de-D&ocirc;me est priv&#233;. Veuillez saisir le mot de passe pour y acc&#233;der.</p>

        <form id="gate-form" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" autocomplete="current-password" placeholder="Saisir le mot de passe" required autofocus>
            </div>
            <button type="submit" id="submit-btn">Acc&#233;der</button>
            <div class="loader" id="loader"></div>
            <div class="error-message" id="error-msg">Mot de passe incorrect ou erreur de d&#233;cryptage.</div>
        </form>
    </div>

        function base64ToArrayBuffer(base64) {
            const binaryString = atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        async function decrypt(ciphertextB64, saltB64, password) {
            const salt = new Uint8Array(base64ToArrayBuffer(saltB64));
            const ciphertext = new Uint8Array(base64ToArrayBuffer(ciphertextB64));
            
            // Key stretching: 5000 rounds of SHA-256
            let key = new TextEncoder().encode(password);
            for (let i = 0; i < 5000; i++) {
                const combined = new Uint8Array(key.length + salt.length);
                combined.set(key, 0);
                combined.set(salt, key.length);
                key = new Uint8Array(await crypto.subtle.digest('SHA-256', combined));
            }
            
            // Keystream generation & XOR
            const decrypted = new Uint8Array(ciphertext.length);
            const chunk_size = 32;
            const num_chunks = Math.ceil(ciphertext.length / chunk_size);
            
            for (let i = 0; i < num_chunks; i++) {
                const counterBytes = new Uint8Array(4);
                new DataView(counterBytes.buffer).setUint32(0, i, false);
                
                const block = new Uint8Array(key.length + salt.length + 4);
                block.set(key, 0);
                block.set(salt, key.length);
                block.set(counterBytes, key.length + salt.length);
                
                const keystreamChunk = new Uint8Array(await crypto.subtle.digest('SHA-256', block));
                
                const start = i * chunk_size;
                const end = Math.min(start + chunk_size, ciphertext.length);
                for (let j = start; j < end; j++) {
                    decrypted[j] = ciphertext[j] ^ keystreamChunk[j - start];
                }
            }
            
            return new TextDecoder().decode(decrypted);
        }

        async function handleLogin(event) {
            event.preventDefault();
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('submit-btn');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('error-msg');

            errorMsg.style.display = 'none';
            submitBtn.style.display = 'none';
            loader.style.display = 'block';

            try {
                const decryptedHtml = await decrypt(CIPHERTEXT_B64, SALT_B64, passwordInput.value);
                
                // Simple validation check: decrypted content should contain '<html' or '<!DOCTYPE'
                if (!decryptedHtml.includes('<html') && !decryptedHtml.includes('<!DOCTYPE')) {
                    throw new Error("Invalid password");
                }

                // Inject decrypted HTML
                document.open();
                document.write(decryptedHtml);
                document.close();
            } catch (e) {
                console.error(e);
                loader.style.display = 'none';
                submitBtn.style.display = 'block';
                errorMsg.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }
